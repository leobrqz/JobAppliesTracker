services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobappliestracker-backend
    restart: always
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      # Host 8001 avoids clashing with self-hosted Supabase Kong on 8000
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jobappliestracker-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobappliestracker-frontend
    restart: always
    environment:
      CI: "true"
      SUPABASE_URL_INTERNAL: http://host.docker.internal:8000
    env_file:
      - ./frontend/apps/web/.env
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm --filter web dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    networks:
      - jobappliestracker-network

volumes:
  frontend_node_modules:

networks:
  jobappliestracker-network:
    driver: bridge
